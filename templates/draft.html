<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초안 검토</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- 헤더 -->
  <div class="bg-white border-b sticky top-0 z-10">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="/" class="text-blue-600 text-sm font-medium">← 목록</a>
      <h1 class="text-base font-bold text-gray-800 truncate flex-1">초안 검토</h1>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-6">

    {% if request.query_params.get('error') %}
    <div class="bg-red-50 text-red-600 rounded-xl p-4 mb-4 text-sm">❌ 발행 실패. 워드프레스 설정을 확인해주세요.</div>
    {% endif %}

    <!-- 원본 정보 -->
    <div class="bg-white rounded-2xl shadow-sm p-5 mb-4">
      <p class="text-xs text-gray-400 font-medium uppercase mb-3">원본 정보</p>
      <div class="space-y-2 text-sm">
        <div><span class="text-gray-400">부처:</span> <span class="text-gray-700">{{ draft.department }}</span></div>
        <div><span class="text-gray-400">대상:</span> <span class="text-gray-700">{{ draft.target[:100] }}</span></div>
        {% if draft.apply_url %}
        <div><span class="text-gray-400">신청:</span> <a href="{{ draft.apply_url }}" class="text-blue-500 underline">바로가기</a></div>
        {% endif %}
      </div>
    </div>

    <!-- 편집 폼 -->
    <form method="post" action="/draft/{{ draft.id }}/publish">
      <div class="bg-white rounded-2xl shadow-sm p-5 mb-4">
        <label class="block text-xs text-gray-400 font-medium uppercase mb-2">제목</label>
        <input
          type="text"
          name="title"
          value="{{ draft.rewritten_title or draft.title }}"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5 mb-6">
        <label class="block text-xs text-gray-400 font-medium uppercase mb-2">본문</label>
        <textarea
          name="content"
          rows="16"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
        >{{ draft.rewritten_content or draft.content }}</textarea>
      </div>

      <!-- 버튼 -->
      <div class="flex gap-3">
        <button
          type="submit"
          class="flex-1 bg-blue-600 text-white rounded-2xl py-4 font-bold text-base hover:bg-blue-700 active:bg-blue-800"
        >
          ✅ 발행하기
        </button>
      </div>
    </form>

    <!-- 거절 버튼 -->
    <form method="post" action="/draft/{{ draft.id }}/reject" class="mt-3">
      <button
        type="submit"
        onclick="return confirm('이 초안을 거절하시겠습니까?')"
        class="w-full bg-gray-100 text-gray-500 rounded-2xl py-4 font-medium text-base hover:bg-gray-200"
      >
        ❌ 거절
      </button>
    </form>

  </div>
</body>
</html>
